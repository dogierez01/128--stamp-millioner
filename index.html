
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Millionaire Academy - Language Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Oswald:wght@500&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #020205;
            background-image: radial-gradient(circle at 50% 50%, #080a24 0%, #020205 100%);
            font-family: 'Oswald', sans-serif;
            margin: 0;
            color: white;
            overflow-y: auto;
        }

        /* --- LOBBY STYLES --- */
        #lobby-view {
            text-align: center;
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
        }

        .studio-title {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-size: 56px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            letter-spacing: 4px;
        }

        .studio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .studio-card {
            background: linear-gradient(180deg, #111432 0%, #050612 100%);
            border: 3px solid #3d5afe;
            border-radius: 50px;
            padding: 40px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .studio-card:hover {
            transform: scale(1.05);
            border-color: #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .studio-card h2 {
            font-family: 'Cinzel', serif;
            color: #e0f7fa;
            margin: 0;
            font-size: 32px;
        }

        .completion-badge {
            display: none;
            margin-top: 15px;
            border-top: 1px solid #3d5afe;
            padding-top: 10px;
        }

        .completion-badge.visible { display: block; }

        #reset-btn {
            background: transparent; color: #ff1744; border: 2px solid #ff1744;
            padding: 10px 20px; font-family: 'Oswald', sans-serif; font-size: 18px;
            border-radius: 4px; cursor: pointer; margin-bottom: 40px;
        }

        /* --- GAME STYLES --- */
        #game-view { display: none; width: 1250px; }

        #studio-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Question Box */
        #question-box {
            width: 100%;
            background: #050612;
            border: 3px solid #3d5afe;
            border-radius: 100px;
            padding: 60px 40px;
            margin-bottom: 50px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 40px rgba(61, 90, 254, 0.3);
        }

        #question-text {
            font-size: 42px;
            font-weight: bold;
            color: #ffffff;
            margin: 0;
        }

        /* Options Grid */
        #options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            width: 100%;
        }

        .option-btn {
            background: #050612;
            border: 2px solid #3d5afe;
            border-radius: 50px;
            padding: 30px 40px;
            font-size: 32px;
            color: #ffffff;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            position: relative;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(61, 90, 254, 0.2);
            border-color: #d4af37;
        }

        .option-label {
            color: #d4af37;
            font-weight: bold;
            margin-right: 20px;
            font-family: 'Cinzel', serif;
        }

        /* Result States */
        .option-btn.selected { background: #d4af37; color: #000; border-color: #fff; }
        .option-btn.correct { background: #39FF14 !important; color: #000; border-color: #fff; font-weight: 900; }
        .option-btn.wrong { background: #ff1744 !important; color: #fff; border-color: #fff; }

        /* Dashboard */
        #dashboard {
            display: flex;
            justify-content: center;
            gap: 40px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #3d5afe;
            border-radius: 10px;
            padding: 20px;
            margin-top: 50px;
            width: 100%;
        }

        .meter { text-align: center; min-width: 250px; }
        .meter-title { font-family: 'Cinzel', serif; font-size: 16px; color: #3d5afe; text-transform: uppercase; }
        .meter-val { font-size: 36px; font-weight: bold; color: #e0f7fa; }
        #success-val { color: #FFFF00; }
        #timer-val { color: #39FF14; text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }

        #back-btn {
            position: fixed; top: 20px; left: 20px;
            background: transparent; border: 1px solid #3d5afe; color: #3d5afe;
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
        }

        /* --- CUSTOM MODAL --- */
        #custom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #050612; border: 2px solid #d4af37; border-radius: 20px;
            padding: 60px; text-align: center; max-width: 600px;
        }
        .modal-btn {
            background: transparent; color: #d4af37; border: 2px solid #d4af37;
            padding: 15px 40px; font-size: 24px; cursor: pointer; border-radius: 10px; margin-top: 30px;
        }

        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>

    <button id="back-btn" onclick="returnToLobby()">◀ LOBBY</button>

    <div id="game-view">

            <div id="options-container">

                <button class="option-btn" id="opt-B" onclick="checkAnswer('B')">

            <div id="dashboard">

            </div>
        </div>
    </div>

            <p id="modal-msg" style="font-size: 24px;"></p>

    </div>

            { tr: "Beni damdan düşercesine aradı.", a: "He called me out of the sudden.", b: "He called me out of the blue.", ans: "B" },
            { tr: "Ona güvenemeyiz.", a: "He is a bad man; in other words, we can't trust him.", b: "He is a bad man; with other words, we can't trust him.", ans: "A" },
            { tr: "O bardağı taşıran son damlaydı.", a: "That was the dropping point.", b: "That was the tipping point.", ans: "B" },
            { tr: "Biletleri peşinen ödeyin.", a: "Pay for the tickets in beforehand.", b: "Pay for the tickets in advance.", ans: "B" },
            { tr: "En azından bir kez dene.", a: "Try it at least once.", b: "Try it at last once.", ans: "A" },
            { tr: "Madalyonun diğer yüzü: orası soğuk.", a: "We will live abroad, but the coin has a flipside: it is cold there.", b: "We will live abroad, but the coin has a backside: it is cold there.", ans: "A" },
            { tr: "Bilseydim yardım ederdim.", a: "If I had knew, I would have helped.", b: "Had I known, I would have helped.", ans: "B" },
            { tr: "Türkiye'de enflasyonu öğrenmelisin.", a: "You have to learn about inflation as long as you stay in Turkey.", b: "You have to learn about inflation so long that you stay in Turkey.", ans: "A" },
            { tr: "Beni yanlış anlama.", a: "Don't get me wrong, but I like it.", b: "Don't take me wrong, but I like it.", ans: "A" },
            { tr: "Çıkmak üzereyim.", a: "I am about to leave.", b: "I am around to leave.", ans: "A" },
            { tr: "Allah'tan güvendeyiz.", a: "Fortunally, we are safe.", b: "Fortunately, we are safe.", ans: "B" },
            { tr: "30 dakikamı alıyor.", a: "It makes me 30 minutes to wash the car.", b: "It takes me 30 minutes to wash the car.", ans: "B" },
            { tr: "Öte yandan, ucuz.", a: "On the other side, it's cheap.", b: "On the other hand, it's cheap.", ans: "B" },
            { tr: "Aynı şey ortağım için geçerli.", a: "The same runs for my partner.", b: "The same goes for my partner.", ans: "B" },
            { tr: "Senin aksine hızlı koşarım.", a: "Dislike you, I run fast.", b: "Unlike you, I run fast.", ans: "B" },
            { tr: "Davet edilmedikçe girme.", a: "Don't enter if not you are invited.", b: "Don't enter unless you are invited.", ans: "B" },
            { tr: "Düştü ama yine de gülümsedi.", a: "He fell, although he smiled.", b: "He fell, yet he smiled.", ans: "B" },
            { tr: "Ekonomi bir kısır döngü.", a: "The Turkish economy is a blind circle.", b: "The Turkish economy is a vicious circle.", ans: "B" },
            { tr: "Ortalama olarak hava sıcak.", a: "On average, it is warm.", b: "On normal, it is warm.", ans: "A" },
            { tr: "Gerçeklerin ışığında kazandı.", a: "Under the light of these facts, he won.", b: "Under the shine of these facts, he won.", ans: "A" },
            { tr: "Eninde sonunda duracak.", a: "He will eventfully stop.", b: "He eventually stops.", ans: "B" },
            { tr: "Çay veya kahve, aynı hesap.", a: "Tea or coffee, same difference.", b: "Tea or coffee, same distinction.", ans: "A" },
            { tr: "Kırk yılda bir konuşuruz.", a: "We talk once in a time.", b: "We talk once in a while.", ans: "B" },
            { tr: "Sözüm ona patron o.", a: "So to tell, he is the boss.", b: "So to say, he is the boss.", ans: "B" },
            { tr: "Benzer şekilde katılıyorum.", a: "Familiarly, I agree.", b: "Similarly, I agree.", ans: "B" }
        ];

        let currentSet = [], retryPool = [], currentIdx = 0, score = 0, corrects = 0, totalAtts = 0, phase = 1, gameId = "";
        let countdown, timerVal = 10;

        const STORAGE_KEY = "millProgress";

        function updateLobby() {
            const progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            ['g1','g2','g3','g4'].forEach(id => {
                if(progress[id]) {
                    document.getElementById('badge-'+id).classList.add('visible');
                    document.getElementById('score-'+id).innerText = progress[id].score;
                    document.getElementById('percent-'+id).innerText = progress[id].percent;
                } else {
                    document.getElementById('badge-'+id).classList.remove('visible');
                }
            });
        }

        function resetProgress() {
            if(confirm("Tüm ilerlemeyi sil?")) { localStorage.removeItem(STORAGE_KEY); updateLobby(); }
        }

        function startStudio(id, title) {
            gameId = id;
            const start = (parseInt(id.slice(1)) - 1) * 32;
            currentSet = rawData.slice(start, start + 32);
            retryPool = []; currentIdx = 0; score = 0; corrects = 0; totalAtts = 0; phase = 1;
            document.getElementById('lobby-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('score-val').innerText = "0";
            document.getElementById('success-val').innerText = "0%";
            renderQuestion();
        }

        function renderQuestion() {
            const pool = phase === 1 ? currentSet : retryPool;
            if(currentIdx >= pool.length) {
                if(phase === 1 && retryPool.length > 0) {
                    showModal("Lifeline Aktif!", "Ana tur bitti. Şimdi yanlışlarını düzeltme vakti!", "BAŞLA", 2);
                } else {
                    endGame();
                }
                return;
            }
            const q = pool[currentIdx];
            document.getElementById('question-text').innerText = q.tr;
            document.getElementById('text-A').innerText = q.a;
            document.getElementById('text-B').innerText = q.b;
            
            resetButtons();
            startTimer();
        }

        function resetButtons() {
            ['A','B'].forEach(l => {
                const b = document.getElementById('opt-'+l);
                b.className = 'option-btn';
                b.disabled = false;
            });
        }

        function startTimer() {
            clearInterval(countdown);
            timerVal = 10;
            document.getElementById('timer-val').innerText = timerVal;
            countdown = setInterval(() => {
                timerVal--;
                document.getElementById('timer-val').innerText = timerVal;
                if(timerVal <= 0) clearInterval(countdown);
            }, 1000);
        }

        function checkAnswer(choice) {
            clearInterval(countdown);
            const pool = phase === 1 ? currentSet : retryPool;
            const q = pool[currentIdx];
            const btn = document.getElementById('opt-'+choice);
            const correctBtn = document.getElementById('opt-'+q.ans);
            
            btn.classList.add('selected');
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

            setTimeout(() => {
                if(choice === q.ans) {
                    btn.classList.add('correct');
                    if(phase === 1) { score += 100; corrects++; }
                } else {
                    btn.classList.add('wrong');
                    correctBtn.classList.add('correct');
                    if(phase === 1) retryPool.push(q);
                }

                if(phase === 1) {
                    totalAtts++;
                    document.getElementById('score-val').innerText = score;
                    document.getElementById('success-val').innerText = Math.round((corrects/totalAtts)*100) + "%";
                }

                setTimeout(() => {
                    if(phase === 2 && choice === q.ans) {
                        retryPool.splice(currentIdx, 1);
                    } else {
                        currentIdx++;
                    }
                    renderQuestion();
                }, 1000);
            }, 600);
        }

        function showModal(title, msg, btn, nextPhase) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal-btn').innerText = btn;
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function modalAction() {
            document.getElementById('custom-modal').style.display = 'none';
            phase = 2; currentIdx = 0;
            renderQuestion();
        }

        function endGame() {
            const perc = Math.round((corrects/totalAtts)*100);
            let progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            progress[gameId] = { score, percent: perc };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            
            document.getElementById('question-text').innerText = "MISSION COMPLETE!";
            document.getElementById('options-container').style.display = 'none';
        }

        function returnToLobby() {
            clearInterval(countdown);
            document.getElementById('lobby-view').style.display = 'block';
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('options-container').style.display = 'grid';
            updateLobby();
        }

        updateLobby();
    </script>
</body>
